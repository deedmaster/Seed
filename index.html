 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Seed OS – Neko Lab Interface</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root {
      --bg: #05060a;
      --panel: #0b0f18;
      --accent: #38ff88;
      --accent-warn: #ffb347;
      --accent-error: #ff4b4b;
      --text: #f5f7ff;
      --muted: #8a92a8;
      --border: #1a2133;
      --button-bg: #111624;
      --button-hover: #171d2e;
      --radius: 12px;
      --transition-fast: 0.15s ease-out;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      background: radial-gradient(circle at top, #151b2f 0, #05060a 55%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .seed-shell {
      width: 100%;
      max-width: 900px;
      background: linear-gradient(145deg, #05060a, #090c14);
      border-radius: 20px;
      border: 1px solid #1b2235;
      box-shadow: 0 0 40px rgba(0, 0, 0, 0.7);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .seed-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 4px 8px;
    }

    .seed-title {
      font-size: 14px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .seed-status {
      font-size: 12px;
      color: var(--muted);
    }

    .seed-status span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
    }

    .status-dot.thinking {
      background: var(--accent-warn);
      box-shadow: 0 0 8px var(--accent-warn);
    }

    .status-dot.error {
      background: var(--accent-error);
      box-shadow: 0 0 8px var(--accent-error);
    }

    .seed-main {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .seed-console {
      background: var(--panel);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 10px 12px;
      min-height: 160px;
      max-height: 260px;
      overflow-y: auto;
      font-size: 13px;
      line-height: 1.4;
    }

    .seed-console-entry {
      margin-bottom: 6px;
    }

    .seed-console-entry.system {
      color: var(--muted);
    }

    .seed-console-entry.neko {
      color: var(--accent);
    }

    .seed-console-entry.user {
      color: #9bb4ff;
    }

    .seed-console-entry strong {
      font-weight: 600;
    }

    .seed-input-area {
      position: relative;
      display: grid;
      grid-template-rows: auto auto;
      gap: 8px;
    }

    .command-ring {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      grid-template-rows: auto auto auto;
      align-items: center;
      justify-items: center;
      gap: 6px;
    }

    .command-ring-spacer {
      height: 1px;
      width: 1px;
    }

    .command-button {
      background: var(--button-bg);
      border-radius: 999px;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 11px;
      padding: 4px 10px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: background var(--transition-fast), border-color var(--transition-fast), color var(--transition-fast), transform var(--transition-fast);
      white-space: nowrap;
    }

    .command-button:hover {
      background: var(--button-hover);
      border-color: var(--accent);
      color: var(--text);
      transform: translateY(-1px);
    }

    .command-button.primary {
      color: var(--text);
      border-color: var(--accent);
    }

    .command-button.hidden {
      opacity: 0;
      pointer-events: none;
      transform: scale(0.9);
    }

    .command-button.back {
      border-color: var(--accent);
      color: var(--accent);
    }

    .prompt-row {
      display: flex;
      align-items: stretch;
      gap: 8px;
      position: relative;
    }

    .prompt-box {
      flex: 1;
      background: var(--panel);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 6px 10px;
      gap: 8px;
      position: relative;
      overflow: hidden;
      min-height: 170px;
    }

    .prompt-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 14px;
      position: relative;
      z-index: 2;
    }

    .prompt-input::placeholder {
      color: #5c6680;
    }

    .send-button {
      background: var(--accent);
      color: #020308;
      border-radius: 999px;
      border: none;
      padding: 6px 14px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: transform var(--transition-fast), box-shadow var(--transition-fast), background var(--transition-fast);
      box-shadow: 0 0 12px rgba(56, 255, 136, 0.4);
      white-space: nowrap;
    }

    .send-button:hover {
      transform: translateY(-1px);
      box-shadow: 0 0 18px rgba(56, 255, 136, 0.7);
      background: #4bff98;
    }

    .send-button:active {
      transform: translateY(0);
      box-shadow: 0 0 8px rgba(56, 255, 136, 0.4);
    }

    /* Neon avatar hologram */

    .neko-avatar {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      opacity: 0.4;
      z-index: 1;
    }

    .neko-outline {
      width: 90px;
      height: 130px;
      border-radius: 24px;
      border: 2px solid var(--accent);
      box-shadow: 0 0 18px rgba(56, 255, 136, 0.9);
      position: relative;
      animation: nekoIdle 3s ease-in-out infinite;
    }

    .neko-outline::before {
      content: "";
      position: absolute;
      width: 40px;
      height: 32px;
      border-radius: 16px;
      border: 2px solid currentColor;
      top: -26px;
      left: 50%;
      transform: translateX(-50%);
    }

    .neko-outline::after {
      content: "";
      position: absolute;
      width: 52px;
      height: 40px;
      border-radius: 6px;
      border: 2px solid currentColor;
      bottom: 6px;
      left: 50%;
      transform: translateX(-50%);
    }

    .neko-ear-left,
    .neko-ear-right {
      position: absolute;
      width: 0;
      height: 0;
      border-left: 10px solid transparent;
      border-right: 10px solid transparent;
      border-bottom: 16px solid currentColor;
      top: -40px;
    }

    .neko-ear-left {
      left: 10px;
    }

    .neko-ear-right {
      right: 10px;
    }

    .neko-glasses {
      position: absolute;
      width: 34px;
      height: 10px;
      border-radius: 999px;
      border: 2px solid currentColor;
      top: -18px;
      left: 50%;
      transform: translateX(-50%);
      box-shadow: 0 0 8px currentColor;
    }

    .neko-state-ready .neko-outline {
      color: var(--accent);
      border-color: var(--accent);
      box-shadow: 0 0 18px rgba(56, 255, 136, 0.9);
    }

    .neko-state-thinking .neko-outline {
      color: var(--accent-warn);
      border-color: var(--accent-warn);
      box-shadow: 0 0 18px rgba(255, 179, 71, 0.9);
      animation: nekoThinking 1.4s ease-in-out infinite;
    }

    .neko-state-error .neko-outline {
      color: var(--accent-error);
      border-color: var(--accent-error);
      box-shadow: 0 0 20px rgba(255, 75, 75, 1);
      animation: nekoError 0.6s ease-in-out infinite;
    }

    .neko-pointer {
      position: fixed;
      width: 26px;
      height: 26px;
      border-radius: 999px;
      border: 2px dashed var(--accent);
      opacity: 0;
      transform: scale(0.7);
      transition: opacity 0.2s ease-out, transform 0.2s ease-out, top 0.2s ease-out, left 0.2s ease-out;
      pointer-events: none;
      z-index: 40;
    }

    .neko-pointer.active {
      opacity: 1;
      transform: scale(1);
    }

    @keyframes nekoIdle {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }

    @keyframes nekoThinking {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    @keyframes nekoError {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-3px); }
      75% { transform: translateX(3px); }
    }

    .submenu-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: center;
      margin-top: 4px;
    }

    .submenu-button {
      background: var(--button-bg);
      border-radius: 999px;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 11px;
      padding: 4px 10px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: background var(--transition-fast), border-color var(--transition-fast), color var(--transition-fast), transform var(--transition-fast);
      white-space: nowrap;
    }

    .submenu-button:hover {
      background: var(--button-hover);
      border-color: var(--accent);
      color: var(--text);
      transform: translateY(-1px);
    }

    .submenu-container.hidden {
      display: none;
    }

    .mic-toggle {
      position: fixed;
      right: 18px;
      bottom: 18px;
      width: 52px;
      height: 52px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: radial-gradient(circle at 30% 0, #3bff9a 0, #0b0f18 55%);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 0 18px rgba(56, 255, 136, 0.5);
      transition: transform var(--transition-fast), box-shadow var(--transition-fast), border-color var(--transition-fast), background var(--transition-fast);
      z-index: 50;
    }

    .mic-toggle-icon {
      width: 20px;
      height: 28px;
      border-radius: 999px;
      border: 2px solid #020308;
      position: relative;
    }

    .mic-toggle-icon::before {
      content: "";
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 999px;
      border: 2px solid #020308;
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%);
      border-top-color: transparent;
      border-left-color: transparent;
      border-right-color: transparent;
    }

    .mic-toggle.off {
      background: #101522;
      box-shadow: 0 0 8px rgba(0, 0, 0, 0.7);
      border-color: #252b3d;
    }

    .mic-toggle.off .mic-toggle-icon {
      border-color: #555d72;
    }

    .mic-toggle.off .mic-toggle-icon::before {
      border-color: #555d72;
      border-top-color: transparent;
      border-left-color: transparent;
      border-right-color: transparent;
    }

    .mic-toggle.listening {
      background: radial-gradient(circle at 30% 0, #38ff88 0, #0b0f18 55%);
      box-shadow: 0 0 24px rgba(56, 255, 136, 0.9);
      border-color: var(--accent);
      transform: translateY(-1px);
    }

    .mic-toggle.listening .mic-toggle-icon {
      animation: micPulse 1.2s ease-in-out infinite;
    }

    @keyframes micPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }

    @media (max-width: 640px) {
      .seed-shell {
        padding: 12px;
      }
      .prompt-box {
        min-height: 180px;
      }
    }
  </style>
</head>
<body>
  <div class="seed-shell">
    <div class="seed-header">
      <div class="seed-title">Seed OS · Neko Lab Interface</div>
      <div class="seed-status">
        <span><span class="status-dot" id="statusDot"></span> <span id="statusLabel">Ready</span></span>
      </div>
    </div>

    <div class="seed-main">
      <div class="seed-console" id="console">
        <div class="seed-console-entry system">
          <strong>[system]</strong> Seed OS brain initialized. Neko is the interface. Text + voice both feed the same intent engine.
        </div>
        <div class="seed-console-entry system">
          <strong>[hint]</strong> Describe what you want Seed to do. I’ll propose the change, you approve, then I apply it inside this running system.
        </div>
      </div>

      <div class="seed-input-area">
        <div class="command-ring">
          <button class="command-button primary" data-main="master" id="btnMaster">Master Control</button>
          <div class="command-ring-spacer"></div>
          <button class="command-button" data-main="sandbox" id="btnSandbox">Sandbox</button>
          <button class="command-button" data-main="system" id="btnSystem">System Options</button>
          <div class="command-ring-spacer"></div>
          <button class="command-button" data-main="extra" id="btnExtra">Extra Slot</button>
        </div>

        <div class="submenu-container hidden" id="submenuContainer">
          <div class="submenu-row" id="submenuButtons"></div>
          <div class="submenu-row">
            <button class="command-button back" id="btnBack">&larr; Back to Main Controls</button>
          </div>
        </div>

        <div class="prompt-row">
          <div class="prompt-box" id="promptBox">
            <div class="neko-avatar neko-state-ready" id="nekoAvatar">
              <div class="neko-outline">
                <div class="neko-ear-left"></div>
                <div class="neko-ear-right"></div>
                <div class="neko-glasses"></div>
              </div>
            </div>

            <input
              id="promptInput"
              class="prompt-input"
              type="text"
              placeholder="Tell Seed what to change. Example: “add a dev tools button”, “switch theme”, “make avatar bigger”."
            />
          </div>
          <button class="send-button" id="btnSend">
            <span>Send</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="neko-pointer" id="nekoPointer"></div>

  <button class="mic-toggle off" id="micToggle" aria-label="Toggle voice input">
    <div class="mic-toggle-icon"></div>
  </button>

  <script>
    // Core elements
    const consoleEl = document.getElementById("console");
    const promptInput = document.getElementById("promptInput");
    const btnSend = document.getElementById("btnSend");
    const micToggle = document.getElementById("micToggle");
    const statusDot = document.getElementById("statusDot");
    const statusLabel = document.getElementById("statusLabel");
    const nekoAvatar = document.getElementById("nekoAvatar");
    const nekoPointer = document.getElementById("nekoPointer");
    const submenuContainer = document.getElementById("submenuContainer");
    const submenuButtons = document.getElementById("submenuButtons");
    const btnBack = document.getElementById("btnBack");
    const promptBox = document.getElementById("promptBox");

    const mainButtons = {
      master: document.getElementById("btnMaster"),
      sandbox: document.getElementById("btnSandbox"),
      system: document.getElementById("btnSystem"),
      extra: document.getElementById("btnExtra")
    };

    // Seed brain state
    const SeedBrain = {
      modules: {},
      config: {
        theme: "dark",
        avatarSize: "large",
        devToolsEnabled: false
      },
      lastProposal: null
    };

    let currentMainPanel = null;
    let listening = false;
    let recognition = null;

    // Console logging
    function logEntry(type, text) {
      const div = document.createElement("div");
      div.classList.add("seed-console-entry");
      if (type === "system") div.classList.add("system");
      if (type === "neko") div.classList.add("neko");
      if (type === "user") div.classList.add("user");
      div.innerHTML = `<strong>[${type}]</strong> ${text}`;
      consoleEl.appendChild(div);
      consoleEl.scrollTop = consoleEl.scrollHeight;
    }

    // Avatar + status
    function setNekoState(state) {
      nekoAvatar.classList.remove("neko-state-ready", "neko-state-thinking", "neko-state-error");
      statusDot.classList.remove("thinking", "error");
      if (state === "ready") {
        nekoAvatar.classList.add("neko-state-ready");
        statusLabel.textContent = "Ready";
      } else if (state === "thinking") {
        nekoAvatar.classList.add("neko-state-thinking");
        statusDot.classList.add("thinking");
        statusLabel.textContent = "Thinking";
      } else if (state === "error") {
        nekoAvatar.classList.add("neko-state-error");
        statusDot.classList.add("error");
        statusLabel.textContent = "Issue";
      }
    }

    function pointNekoAtElement(el) {
      if (!el) return;
      const rect = el.getBoundingClientRect();
      const pointerRect = nekoPointer.getBoundingClientRect();
      const x = rect.left + rect.width / 2;
      const y = rect.top + rect.height / 2;
      nekoPointer.style.left = x - pointerRect.width / 2 + "px";
      nekoPointer.style.top = y - pointerRect.height / 2 + "px";
      nekoPointer.classList.add("active");
      setTimeout(() => {
        nekoPointer.classList.remove("active");
      }, 1200);
    }

    // Command ring
    function showMainButtons() {
      Object.values(mainButtons).forEach(btn => {
        btn.classList.remove("hidden");
        btn.classList.remove("primary");
      });
      mainButtons.master.classList.add("primary");
      submenuContainer.classList.add("hidden");
      currentMainPanel = null;
    }

    function openMainPanel(panel) {
      currentMainPanel = panel;
      Object.entries(mainButtons).forEach(([key, btn]) => {
        if (key === panel) {
          btn.classList.remove("hidden");
          btn.classList.add("primary");
        } else {
          btn.classList.add("hidden");
          btn.classList.remove("primary");
        }
      });
      buildSubmenu(panel);
      submenuContainer.classList.remove("hidden");
      pointNekoAtElement(mainButtons[panel]);
    }

    function buildSubmenu(panel) {
      submenuButtons.innerHTML = "";
      let items = [];

      if (panel === "master") {
        items = [
          { id: "mc-overview", label: "System Overview", desc: "Summarize current modules and config." },
          { id: "mc-list-modules", label: "List Modules", desc: "Show loaded modules." },
          { id: "mc-reset-proposal", label: "Clear Last Proposal", desc: "Forget any pending change." }
        ];
      } else if (panel === "sandbox") {
        items = [
          { id: "sb-test-theme", label: "Test Theme Flip", desc: "Preview a theme change without committing." },
          { id: "sb-test-avatar", label: "Test Avatar Size", desc: "Preview a different avatar size." }
        ];
      } else if (panel === "system") {
        items = [
          { id: "sys-status", label: "System Status", desc: "Report health, config, and last proposal." },
          { id: "sys-config", label: "Config Summary", desc: "Explain current configuration." }
        ];
      } else if (panel === "extra") {
        items = [
          { id: "ex-devtools", label: "Toggle Dev Tools Module", desc: "Enable or disable the Dev Tools button." }
        ];
      }

      items.forEach(item => {
        const btn = document.createElement("button");
        btn.className = "submenu-button";
        btn.textContent = item.label;
        btn.dataset.actionId = item.id;
        btn.title = item.desc;
        btn.addEventListener("click", () => handleSubmenuAction(item));
        submenuButtons.appendChild(btn);
      });
    }

    btnBack.addEventListener("click", () => {
      logEntry("neko", "Returning to main control buttons.");
      showMainButtons();
      setNekoState("ready");
    });

    Object.entries(mainButtons).forEach(([key, btn]) => {
      btn.addEventListener("click", () => {
        logEntry("neko", `Opening ${btn.textContent} panel.`);
        setNekoState("thinking");
        openMainPanel(key);
        setTimeout(() => setNekoState("ready"), 400);
      });
    });

    // Seed Brain: proposals + apply

    function proposeChange(label, description, applyFn) {
      SeedBrain.lastProposal = { label, description, applyFn };
      logEntry("neko", `Proposed change: <strong>${label}</strong>. ${description}`);
      logEntry("neko", "If this looks right, say “yes”, “do it”, or “go ahead” and I’ll apply it inside Seed.");
    }

    function applyLastProposal() {
      if (!SeedBrain.lastProposal) {
        logEntry("neko", "There is no pending change to apply. Ask me to change something first.");
        return;
      }
      const { label, applyFn } = SeedBrain.lastProposal;
      try {
        setNekoState("thinking");
        applyFn();
        logEntry("neko", `Applied: <strong>${label}</strong>. This only affects the running Seed session.`);
        SeedBrain.lastProposal = null;
        setTimeout(() => setNekoState("ready"), 400);
      } catch (e) {
        logEntry("system", `Error applying change: ${e.message}`);
        setNekoState("error");
        setTimeout(() => setNekoState("ready"), 800);
      }
    }

    // Example internal changes

    function flipTheme() {
      if (SeedBrain.config.theme === "dark") {
        document.documentElement.style.setProperty("--bg", "#f5f7ff");
        document.documentElement.style.setProperty("--panel", "#ffffff");
        document.documentElement.style.setProperty("--text", "#020308");
        document.documentElement.style.setProperty("--muted", "#4b5565");
        SeedBrain.config.theme = "light";
      } else {
        document.documentElement.style.setProperty("--bg", "#05060a");
        document.documentElement.style.setProperty("--panel", "#0b0f18");
        document.documentElement.style.setProperty("--text", "#f5f7ff");
        document.documentElement.style.setProperty("--muted", "#8a92a8");
        SeedBrain.config.theme = "dark";
      }
    }

    function setAvatarSize(size) {
      const outline = nekoAvatar.querySelector(".neko-outline");
      if (!outline) return;
      if (size === "large") {
        outline.style.width = "90px";
        outline.style.height = "130px";
        SeedBrain.config.avatarSize = "large";
      } else if (size === "medium") {
        outline.style.width = "70px";
        outline.style.height = "100px";
        SeedBrain.config.avatarSize = "medium";
      } else {
        outline.style.width = "50px";
        outline.style.height = "80px";
        SeedBrain.config.avatarSize = "small";
      }
    }

    function toggleDevToolsModule() {
      SeedBrain.config.devToolsEnabled = !SeedBrain.config.devToolsEnabled;
      const existing = document.getElementById("btnDevTools");
      if (SeedBrain.config.devToolsEnabled) {
        if (!existing) {
          const btn = document.createElement("button");
          btn.id = "btnDevTools";
          btn.className = "command-button";
          btn.textContent = "Dev Tools";
          btn.addEventListener("click", () => {
            logEntry("neko", "Dev Tools panel is a placeholder. In a future build, this can host inspector tools.");
          });
          // Attach near Extra
          mainButtons.extra.insertAdjacentElement("afterend", btn);
        }
      } else {
        if (existing) existing.remove();
      }
    }

    // Submenu actions

    function handleSubmenuAction(item) {
      setNekoState("thinking");

      if (item.id === "mc-overview") {
        logEntry("neko", `Modules loaded: ${Object.keys(SeedBrain.modules).length || "none yet"}.`);
        logEntry("neko", `Theme: ${SeedBrain.config.theme}. Avatar size: ${SeedBrain.config.avatarSize}. DevTools: ${SeedBrain.config.devToolsEnabled ? "on" : "off"}.`);
        setNekoState("ready");
        return;
      }

      if (item.id === "mc-list-modules") {
        const keys = Object.keys(SeedBrain.modules);
        if (!keys.length) {
          logEntry("neko", "No named modules registered yet. I can still change layout and config directly.");
        } else {
          logEntry("neko", "Loaded modules: " + keys.join(", "));
        }
        setNekoState("ready");
        return;
      }

      if (item.id === "mc-reset-proposal") {
        SeedBrain.lastProposal = null;
        logEntry("neko", "Cleared the last pending change. You can ask for a new one.");
        setNekoState("ready");
        return;
      }

      if (item.id === "sb-test-theme") {
        logEntry("neko", "Sandbox: previewing a theme flip. This is just a visual test; you can ask me to commit it after.");
        flipTheme();
        setTimeout(() => setNekoState("ready"), 400);
        return;
      }

      if (item.id === "sb-test-avatar") {
        logEntry("neko", "Sandbox: previewing a different avatar size.");
        const next = SeedBrain.config.avatarSize === "large" ? "medium" : "large";
        setAvatarSize(next);
        setTimeout(() => setNekoState("ready"), 400);
        return;
      }

      if (item.id === "sys-status") {
        logEntry("neko", `Status: theme=${SeedBrain.config.theme}, avatarSize=${SeedBrain.config.avatarSize}, devTools=${SeedBrain.config.devToolsEnabled ? "on" : "off"}.`);
        if (SeedBrain.lastProposal) {
          logEntry("neko", `Pending proposal: <strong>${SeedBrain.lastProposal.label}</strong>.`);
        } else {
          logEntry("neko", "No pending proposals.");
        }
        setNekoState("ready");
        return;
      }

      if (item.id === "sys-config") {
        logEntry("neko", "Config summary: this Seed session can change theme, avatar size, and UI controls safely in memory.");
        setNekoState("ready");
        return;
      }

      if (item.id === "ex-devtools") {
        proposeChange(
          "Toggle Dev Tools module",
          "This will add or remove a Dev Tools button in the command ring. It’s a safe UI-only change.",
          () => toggleDevToolsModule()
        );
        setNekoState("ready");
        return;
      }

      setNekoState("ready");
    }

    // Intent engine

    function interpretIntent(text) {
      const lower = text.toLowerCase().trim();
      if (!lower) return { type: "empty" };

      if (lower.includes("sandbox")) return { type: "openPanel", panel: "sandbox" };
      if (lower.includes("master")) return { type: "openPanel", panel: "master" };
      if (lower.includes("system")) return { type: "openPanel", panel: "system" };
      if (lower.includes("extra")) return { type: "openPanel", panel: "extra" };

      const confirms = ["yes", "go ahead", "that's fine", "that’s fine", "do it", "confirm", "ok", "okay", "apply"];
      if (confirms.includes(lower)) {
        return { type: "confirm" };
      }

      if (lower.includes("theme")) {
        return { type: "changeTheme" };
      }

      if (lower.includes("avatar") && (lower.includes("bigger") || lower.includes("larger"))) {
        return { type: "avatarSize", size: "large" };
      }

      if (lower.includes("avatar") && (lower.includes("smaller") || lower.includes("tiny"))) {
        return { type: "avatarSize", size: "small" };
      }

      if (lower.includes("dev tools") || lower.includes("devtools")) {
        return { type: "toggleDevTools" };
      }

      if (lower.includes("button") && lower.includes("dev")) {
        return { type: "toggleDevTools" };
      }

      if (lower.startsWith("build") || lower.startsWith("create") || lower.startsWith("add")) {
        return { type: "buildRequest", text };
      }

      return { type: "freeform", text };
    }

    function handleUserInput(text) {
      logEntry("user", text);
      setNekoState("thinking");

      const intent = interpretIntent(text);

      if (intent.type === "empty") {
        setNekoState("ready");
        return;
      }

      if (intent.type === "openPanel") {
        logEntry("neko", `Interpreted as: open <strong>${intent.panel}</strong> panel.`);
        openMainPanel(intent.panel);
        setTimeout(() => setNekoState("ready"), 400);
        return;
      }

      if (intent.type === "confirm") {
        logEntry("neko", "Confirmation detected. I’ll apply the last proposed change inside this Seed session.");
        applyLastProposal();
        return;
      }

      if (intent.type === "changeTheme") {
        proposeChange(
          "Flip theme",
          "Switch between dark and light theme for this Seed session.",
          () => flipTheme()
        );
        setNekoState("ready");
        return;
      }

      if (intent.type === "avatarSize") {
        const label = intent.size === "large" ? "Make avatar larger" : "Make avatar smaller";
        proposeChange(
          label,
          "Adjust the avatar hologram size inside the prompt box.",
          () => setAvatarSize(intent.size)
        );
        setNekoState("ready");
        return;
      }

      if (intent.type === "toggleDevTools") {
        proposeChange(
          "Toggle Dev Tools button",
          "Add or remove a Dev Tools button in the command ring.",
          () => toggleDevToolsModule()
        );
        setNekoState("ready");
        return;
      }

      if (intent.type === "buildRequest") {
        logEntry(
          "neko",
          "Interpreted as a build request. In this version, I can change layout, theme, avatar, and controls. For deeper modules, I’ll propose structures, not write files."
        );
        proposeChange(
          "Record build idea",
          "Store this request as a design note in the console so you can act on it later.",
          () => {
            logEntry("system", `Design note recorded: “${intent.text}”`);
          }
        );
        setNekoState("ready");
        return;
      }

      if (intent.type === "freeform") {
        logEntry(
          "neko",
          "Freeform request received. I’ll treat this as guidance for how you want Seed to behave and respond with suggestions, not automatic file changes."
        );
        setNekoState("ready");
        return;
      }
    }

    // Text input
    btnSend.addEventListener("click", () => {
      const text = promptInput.value.trim();
      if (!text) return;
      promptInput.value = "";
      handleUserInput(text);
    });

    promptInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        const text = promptInput.value.trim();
        if (!text) return;
        promptInput.value = "";
        handleUserInput(text);
      }
    });

    // Voice input
    function initSpeech() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) {
        logEntry("system", "Voice input not supported in this browser. Mic toggle will be visual only.");
        return null;
      }
      const rec = new SpeechRecognition();
      rec.lang = "en-US";
      rec.interimResults = false;
      rec.maxAlternatives = 1;

      rec.addEventListener("result", (event) => {
        const transcript = event.results[0][0].transcript;
        logEntry("user", `(voice) ${transcript}`);
        handleUserInput(transcript);
      });

      rec.addEventListener("end", () => {
        if (listening) {
          toggleListening(false);
        }
      });

      rec.addEventListener("error", (e) => {
        logEntry("system", `Voice error: ${e.error}`);
        setNekoState("error");
        setTimeout(() => setNekoState("ready"), 1000);
        toggleListening(false);
      });

      return rec;
    }

    function toggleListening(forceState) {
      const newState = typeof forceState === "boolean" ? forceState : !listening;
      listening = newState;

      if (!recognition) {
        recognition = initSpeech();
      }

      if (!recognition) {
        micToggle.classList.add("off");
        micToggle.classList.remove("listening");
        return;
      }

      if (listening) {
        micToggle.classList.remove("off");
        micToggle.classList.add("listening");
        setNekoState("thinking");
        logEntry("system", "Voice listening started. Speak a request, then I’ll stop automatically.");
        try {
          recognition.start();
        } catch (e) {}
      } else {
        micToggle.classList.add("off");
        micToggle.classList.remove("listening");
        try {
          recognition.stop();
        } catch (e) {}
        setNekoState("ready");
        logEntry("system", "Voice listening stopped.");
      }
    }

    micToggle.addEventListener("click", () => {
      toggleListening();
    });

    // Initial state
    showMainButtons();
    setNekoState("ready");
  </script>
</body>
</html>
